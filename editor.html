<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - QuickSync Text</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">QuickSync</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="editor.html" class="active">Editor</a>
                <a href="about.html">Tentang</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>QuickSync Editor</h1>
            <p id="status">Menginisialisasi...</p>
        </header>

        <div id="setup-section" class="card">
            <div id="qrcode-container">
                <div id="qrcode"></div>
                <p>Scan untuk join kolaborasi</p>
            </div>
            <div class="info-group">
                <label>ID Anda:</label>
                <div class="id-display">
                    <span id="my-id">...</span>
                    <button id="copy-link-btn" class="btn-sm">Salin Link</button>
                </div>
            </div>
        </div>

        <div class="editor-section card">
            <textarea id="text-input" placeholder="Mulai mengetik di sini..."></textarea>
            <div class="controls">
                <button id="copy-btn" class="btn primary">Salin Teks</button>
                <button id="clear-btn" class="btn danger">Hapus Semua</button>
            </div>
        </div>
        
        <footer>
            <p id="connection-count">Terhubung ke: 0 perangkat</p>
            <p>Dibuat oleh purujawa06-bot</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
