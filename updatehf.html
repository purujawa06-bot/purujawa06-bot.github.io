<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HF Manager Pro - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background-color: #0b0f19; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .hf-yellow { color: #FFD21E; }
        .bg-hf-yellow { background-color: #FFD21E; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .refresh-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Auth Overlay -->
    <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90 hidden p-4">
        <div class="glass p-8 rounded-2xl w-full max-w-md border border-gray-700 text-center">
            <div class="text-5xl mb-4">🤗</div>
            <h2 class="text-2xl font-bold mb-4 text-white">Hugging Face Token</h2>
            <p class="text-sm mb-6 text-gray-400">Masukkan <b>User Access Token (Write)</b> untuk mengelola repositori Anda.</p>
            <input type="password" id="hfTokenInput" placeholder="hf_xxxxxxxxxxxx" class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white mb-4 outline-none focus:border-yellow-500">
            <button onclick="saveToken()" class="w-full bg-hf-yellow hover:bg-yellow-600 text-black font-bold py-3 rounded-lg transition">Hubungkan Sekarang</button>
        </div>
    </div>

    <div id="mainApp" class="max-w-6xl mx-auto opacity-0 transition-opacity duration-500">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 border-b border-gray-800 pb-8">
            <div>
                <h1 class="text-3xl font-black text-white flex items-center gap-2">🤗 HF <span class="hf-yellow">Manager Pro</span></h1>
                <p class="text-gray-400 mt-1" id="userInfo">Mendapatkan data profil...</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchRepos()" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm transition border border-gray-600">
                    <svg id="refreshIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Refresh
                </button>
                <button onclick="logout()" class="bg-red-900/20 text-red-400 border border-red-900/50 px-4 py-2 rounded-lg text-sm hover:bg-red-900/40 transition">Logout</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <!-- Create Repo -->
            <div class="glass p-6 rounded-2xl border-l-4 border-l-yellow-500">
                <h3 class="font-bold text-white mb-4 flex items-center gap-2">➕ Buat Model Baru</h3>
                <input type="text" id="newRepoName" placeholder="nama-model-anda" class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-sm mb-3 focus:border-yellow-500 outline-none">
                <div class="flex items-center gap-2 mb-4">
                    <input type="checkbox" id="isPrivate" class="w-4 h-4 accent-yellow-500">
                    <label for="isPrivate" class="text-xs text-gray-400">Private Repository</label>
                </div>
                <button onclick="createRepo()" id="btnCreate" class="w-full bg-hf-yellow hover:bg-yellow-600 text-black font-bold py-2.5 rounded-lg transition">Buat Repo</button>
            </div>

            <!-- Sync ZIP -->
            <div class="glass p-6 rounded-2xl lg:col-span-2 border-l-4 border-l-orange-500">
                <h3 class="font-bold text-white mb-4 flex items-center gap-2">📦 Batch Sync (ZIP)</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 block mb-1">Target Model</label>
                        <input type="text" id="targetRepo" readonly placeholder="Pilih dari daftar..." class="w-full p-3 rounded bg-gray-800 border border-gray-700 text-sm mb-3 text-yellow-500 font-mono">
                        <label class="text-[10px] uppercase font-bold text-gray-500 block mb-1">File ZIP</label>
                        <input type="file" id="zipFile" accept=".zip" class="text-xs text-gray-400 w-full file:bg-gray-700 file:border-0 file:text-white file:px-3 file:py-2 file:rounded file:mr-3">
                    </div>
                    <div class="flex flex-col justify-end">
                        <button onclick="handleBatchSync()" id="btnUpload" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 rounded-lg shadow-lg transition">Commit & Push ke Hub</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Repo List -->
        <div class="mb-6 flex items-center justify-between">
            <h2 class="text-xl font-bold flex items-center gap-3">
                Daftar Repositori Model 
                <span id="repoCount" class="bg-gray-800 text-yellow-500 px-3 py-1 rounded-full text-xs border border-gray-700">0</span>
            </h2>
        </div>
        
        <div id="repoList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Loader -->
            <div class="col-span-full py-20 text-center text-gray-500">Memuat repositori...</div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 p-4 rounded-xl hidden z-[110] text-white shadow-2xl font-medium transition-all duration-300 border border-white/10"></div>

    <script>
        let HF_TOKEN = localStorage.getItem('hf_token');
        let USERNAME = "";

        // -- Inisialisasi --
        window.onload = () => {
            if (!HF_TOKEN) {
                document.getElementById('authOverlay').classList.remove('hidden');
            } else {
                validateToken();
            }
        };

        function saveToken() {
            const val = document.getElementById('hfTokenInput').value.trim();
            if (!val.startsWith('hf_')) return alert("Token harus diawali dengan 'hf_'");
            localStorage.setItem('hf_token', val);
            HF_TOKEN = val;
            location.reload();
        }

        async function validateToken() {
            try {
                const data = await hfReq("whoami-v2");
                USERNAME = data.name; // Mengambil handle unik username
                document.getElementById('userInfo').innerHTML = `User: <b class="text-white">${USERNAME}</b> (${data.fullname || 'No Name'})`;
                document.getElementById('mainApp').classList.remove('opacity-0');
                fetchRepos();
            } catch (e) {
                localStorage.removeItem('hf_token');
                location.reload();
            }
        }

        // -- API Wrapper --
        async function hfReq(endpoint, method = "GET", body = null, isFormData = false) {
            const headers = { 'Authorization': `Bearer ${HF_TOKEN}` };
            if (!isFormData && body) headers['Content-Type'] = 'application/json';

            const options = { method, headers };
            if (body) options.body = isFormData ? body : JSON.stringify(body);

            const res = await fetch(`https://huggingface.co/api/${endpoint}`, options);
            if (res.status === 204) return true;
            
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || data.message || "Request Error");
            return data;
        }

        // -- CORE FIX: Fetch Repositories --
        async function fetchRepos() {
            const listEl = document.getElementById('repoList');
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('refresh-spin');

            try {
                // Mengambil model spesifik milik author (username)
                // Filter: author=${USERNAME} memastikan hanya model kita yang muncul
                const repos = await hfReq(`models?author=${USERNAME}&sort=lastModified&direction=-1&full=true`);
                
                document.getElementById('repoCount').innerText = repos.length;
                
                if (repos.length === 0) {
                    listEl.innerHTML = `
                        <div class="col-span-full bg-gray-900/50 border border-dashed border-gray-700 rounded-2xl p-12 text-center">
                            <p class="text-gray-500">Tidak ada model ditemukan untuk user <b>${USERNAME}</b>.</p>
                            <p class="text-xs text-gray-600 mt-2">Pastikan Anda sudah membuat model di Hugging Face.</p>
                        </div>`;
                    return;
                }

                listEl.innerHTML = repos.map(repo => {
                    const shortName = repo.id.replace(`${USERNAME}/`, '');
                    const isPrivate = repo.private;
                    return `
                    <div class="glass p-5 rounded-2xl border border-gray-800 hover:border-yellow-500 transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <div class="truncate pr-4">
                                <h4 class="font-bold text-white truncate text-lg">${shortName}</h4>
                                <span class="text-[10px] text-gray-500 font-mono">${repo.id}</span>
                            </div>
                            <span class="text-[10px] px-2 py-0.5 rounded border ${isPrivate ? 'border-red-900 text-red-400' : 'border-green-900 text-green-400'}">
                                ${isPrivate ? 'PRIVATE' : 'PUBLIC'}
                            </span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="selectRepo('${shortName}')" class="flex-1 bg-gray-800 hover:bg-yellow-500 hover:text-black py-2 rounded-lg text-xs font-bold transition">Pilih</button>
                            <button onclick="deleteRepo('${shortName}')" class="px-3 bg-red-900/20 hover:bg-red-600 text-red-500 hover:text-white rounded-lg transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                    </div>`;
                }).join('');

            } catch (err) {
                showToast(err.message, "error");
                listEl.innerHTML = `<div class="col-span-full text-center text-red-400">Gagal memuat data: ${err.message}</div>`;
            } finally {
                icon.classList.remove('refresh-spin');
            }
        }

        // -- Actions --
        function selectRepo(name) {
            document.getElementById('targetRepo').value = name;
            showToast(`Target: ${name}`, "success");
        }

        async function createRepo() {
            const name = document.getElementById('newRepoName').value.trim();
            if (!name) return;
            const btn = document.getElementById('btnCreate');
            btn.disabled = true;
            try {
                await hfReq("repos/create", "POST", { name, type: "model", private: document.getElementById('isPrivate').checked });
                showToast("Repo berhasil dibuat!", "success");
                document.getElementById('newRepoName').value = "";
                fetchRepos();
            } catch (e) { showToast(e.message, "error"); }
            finally { btn.disabled = false; }
        }

        async function handleBatchSync() {
            const repoName = document.getElementById('targetRepo').value;
            const fileInput = document.getElementById('zipFile');
            if (!repoName || !fileInput.files[0]) return showToast("Pilih repo & file ZIP!", "error");

            const btn = document.getElementById('btnUpload');
            btn.innerText = "Processing ZIP...";
            btn.disabled = true;

            try {
                const zip = await JSZip.loadAsync(fileInput.files[0]);
                const formData = new FormData();
                const operations = [];

                for (let path in zip.files) {
                    if (!zip.files[path].dir) {
                        const content = await zip.files[path].async("blob");
                        operations.push({ operation: "add", path: path });
                        formData.append(path, content, path.split('/').pop());
                    }
                }

                formData.append("operations", JSON.stringify(operations));
                formData.append("commit_message", "Web Batch Sync: " + new Date().toLocaleString());

                showToast("Uploading to Hugging Face...", "info");
                await hfReq(`models/${USERNAME}/${repoName}/commit/main`, "POST", formData, true);
                
                showToast("Sync Berhasil!", "success");
                fileInput.value = "";
            } catch (e) {
                showToast(e.message, "error");
            } finally {
                btn.innerText = "Commit & Push ke Hub";
                btn.disabled = false;
            }
        }

        async function deleteRepo(name) {
            if (!confirm(`Hapus repo ${name} selamanya?`)) return;
            try {
                await hfReq("repos/delete", "DELETE", { name: `${USERNAME}/${name}`, type: "model" });
                showToast("Berhasil dihapus", "success");
                fetchRepos();
            } catch (e) { showToast(e.message, "error"); }
        }

        function showToast(msg, type = "info") {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-6 right-6 p-4 rounded-xl z-[110] text-white shadow-2xl transition-all border ${type === 'success' ? 'bg-green-600 border-green-400' : type === 'error' ? 'bg-red-600 border-red-400' : 'bg-blue-600 border-blue-400'}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function logout() { localStorage.removeItem('hf_token'); location.reload(); }
    </script>
</body>
</html>
