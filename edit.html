<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI JSON Editor - Table & Code View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        pre { font-family: 'Consolas', 'Monaco', monospace; }
        input:focus { outline: none; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-database"></i> AI JSON Editor
            </h1>
            <div class="flex gap-4">
                <button onclick="downloadJSON()" class="hover:bg-indigo-700 px-3 py-1 rounded transition">
                    <i class="fas fa-download mr-1"></i> Download
                </button>
                <button onclick="copyToClipboard()" class="hover:bg-indigo-700 px-3 py-1 rounded transition">
                    <i class="fas fa-copy mr-1"></i> Copy JSON
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <!-- Left Panel: Input & Table Editor -->
        <div class="space-y-6">
            <div class="bg-white p-5 rounded-xl shadow-md">
                <h2 class="text-lg font-semibold mb-3 flex items-center gap-2 text-indigo-600">
                    <i class="fas fa-edit"></i> Input JSON
                </h2>
                <textarea id="json-input" class="w-full h-40 p-3 border border-gray-300 rounded-lg text-sm font-mono custom-scrollbar" placeholder='Paste JSON anda di sini (Array of Objects)...'>[
  { "id": 1, "nama": "Produk A", "harga": 5000, "status": "Aktif" },
  { "id": 2, "nama": "Produk B", "harga": 7500, "status": "Non-Aktif" }
]</textarea>
                <div class="mt-3 flex gap-2">
                    <button onclick="processJSON()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition w-full font-medium">
                        Parse ke Tabel
                    </button>
                    <button onclick="beautifyJSON()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition font-medium">
                        Rapikan
                    </button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-md overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-indigo-600 flex items-center gap-2">
                        <i class="fas fa-table"></i> Table Editor
                    </h2>
                    <div class="flex gap-2">
                        <button onclick="addColumn()" class="text-sm bg-blue-500 text-white px-3 py-1 rounded-md hover:bg-blue-600 transition">
                            <i class="fas fa-plus-square mr-1"></i> Kolom
                        </button>
                        <button onclick="addRow()" class="text-sm bg-green-500 text-white px-3 py-1 rounded-md hover:bg-green-600 transition">
                            <i class="fas fa-plus mr-1"></i> Baris
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto custom-scrollbar border rounded-lg">
                    <table class="w-full text-left border-collapse" id="editor-table">
                        <thead class="bg-gray-100 border-b">
                            <tr id="table-head">
                                <th class="p-3 text-sm font-semibold">No Data</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Data Tabel Akan Muncul di Sini -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Right Panel: View JSON & Tools -->
        <div class="space-y-6">
            <div class="bg-slate-900 text-slate-100 p-5 rounded-xl shadow-md h-full flex flex-col min-h-[600px]">
                <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                    <h2 class="text-lg font-semibold flex items-center gap-2 text-indigo-400">
                        <i class="fas fa-code"></i> JSON Output
                    </h2>
                    <span id="status-msg" class="text-xs text-green-400 hidden italic">Tersalin!</span>
                </div>
                <div class="flex-grow overflow-auto custom-scrollbar">
                    <pre id="json-output" class="text-sm leading-relaxed text-indigo-200 whitespace-pre-wrap">{}</pre>
                </div>
                <div class="mt-4 pt-4 border-t border-slate-700 grid grid-cols-2 gap-3">
                    <button onclick="clearAll()" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/50 py-2 rounded-lg transition">
                        Hapus Semua
                    </button>
                    <button onclick="copyToClipboard()" class="bg-indigo-500 hover:bg-indigo-600 text-white py-2 rounded-lg transition">
                        Copy JSON
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentData = [];

        // Inisialisasi
        window.onload = () => {
            processJSON();
        };

        function processJSON() {
            const input = document.getElementById('json-input').value;
            try {
                const parsed = JSON.parse(input);
                currentData = Array.isArray(parsed) ? parsed : [parsed];
                renderTable();
                updateOutput();
            } catch (e) {
                alert("JSON Tidak Valid: " + e.message);
            }
        }

        function renderTable() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            
            if (currentData.length === 0) {
                head.innerHTML = '<th class="p-3">Data Kosong</th>';
                body.innerHTML = '';
                return;
            }

            // Ambil semua keys unik untuk header
            const keys = [...new Set(currentData.flatMap(obj => Object.keys(obj)))];
            
            // Render Head
            let headHtml = '<th class="p-3 text-xs uppercase tracking-wider text-gray-400 w-10 text-center">#</th>';
            keys.forEach(key => {
                headHtml += `
                    <th class="p-3 text-xs uppercase tracking-wider text-gray-600 group">
                        <div class="flex items-center justify-between">
                            <span>${key}</span>
                            <button onclick="deleteColumn('${key}')" class="text-red-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">
                                <i class="fas fa-times-circle"></i>
                            </button>
                        </div>
                    </th>`;
            });
            head.innerHTML = headHtml;

            // Render Body
            let bodyHtml = '';
            currentData.forEach((row, index) => {
                bodyHtml += `<tr class="border-b hover:bg-gray-50 group">`;
                bodyHtml += `<td class="p-3 text-center"><button onclick="deleteRow(${index})" class="text-gray-300 group-hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button></td>`;
                
                keys.forEach(key => {
                    let val = row[key];
                    // Handle Object/Array representation
                    if (typeof val === 'object' && val !== null) {
                        val = JSON.stringify(val);
                    } else if (val === undefined) {
                        val = '';
                    }

                    bodyHtml += `
                        <td class="p-2 border-l border-gray-50">
                            <input type="text" 
                                value='${val}' 
                                onchange="updateData(${index}, '${key}', this.value)"
                                class="w-full bg-transparent p-1 border border-transparent hover:border-indigo-200 rounded focus:bg-white focus:shadow-inner text-sm transition"
                            >
                        </td>`;
                });
                bodyHtml += `</tr>`;
            });
            body.innerHTML = bodyHtml;
        }

        function updateData(index, key, value) {
            // Coba parse value jika itu string JSON (untuk array atau object)
            try {
                if ((value.startsWith('[') && value.endsWith(']')) || (value.startsWith('{') && value.endsWith('}'))) {
                    currentData[index][key] = JSON.parse(value);
                } else {
                    const numVal = Number(value);
                    currentData[index][key] = (!isNaN(numVal) && value !== '' && !value.includes(' ')) ? numVal : value;
                }
            } catch (e) {
                // Jika gagal parse JSON, simpan sebagai string biasa
                currentData[index][key] = value;
            }
            updateOutput();
        }

        function addColumn() {
            const keyName = prompt("Masukkan nama kolom (key) baru:");
            if (keyName && keyName.trim() !== "") {
                if (currentData.length === 0) {
                    currentData.push({ [keyName]: "" });
                } else {
                    currentData.forEach(item => {
                        if (item[keyName] === undefined) item[keyName] = "";
                    });
                }
                renderTable();
                updateOutput();
            }
        }

        function deleteColumn(key) {
            if (confirm(`Hapus kolom "${key}" dari semua baris?`)) {
                currentData.forEach(item => {
                    delete item[key];
                });
                renderTable();
                updateOutput();
            }
        }

        function addRow() {
            const keys = currentData.length > 0 ? [...new Set(currentData.flatMap(obj => Object.keys(obj)))] : ["id"];
            const newRow = {};
            keys.forEach(key => newRow[key] = "");
            currentData.push(newRow);
            renderTable();
            updateOutput();
        }

        function deleteRow(index) {
            currentData.splice(index, 1);
            renderTable();
            updateOutput();
        }

        function updateOutput() {
            const output = document.getElementById('json-output');
            output.textContent = JSON.stringify(currentData, null, 4);
        }

        function beautifyJSON() {
            try {
                const input = document.getElementById('json-input');
                const parsed = JSON.parse(input.value);
                input.value = JSON.stringify(parsed, null, 2);
            } catch (e) {
                alert("Gagal merapikan: JSON tidak valid.");
            }
        }

        function copyToClipboard() {
            const jsonText = JSON.stringify(currentData, null, 4);
            navigator.clipboard.writeText(jsonText).then(() => {
                const msg = document.getElementById('status-msg');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 2000);
            });
        }

        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentData, null, 4));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "data_editor.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function clearAll() {
            if(confirm("Hapus semua data?")) {
                currentData = [];
                document.getElementById('json-input').value = '[]';
                renderTable();
                updateOutput();
            }
        }
    </script>
</body>
</html>
